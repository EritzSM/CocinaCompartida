services:
  db:
    image: postgres:15-alpine
    container_name: cocina_compartida_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cocina_compartida_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cocina_compartida_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./cocina-compartida-api
      dockerfile: Dockerfile
    container_name: cocina_compartida_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-cocina_compartida_db}
      - DB_SSL=false
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./cocina-compartida
      dockerfile: Dockerfile
    container_name: cocina_compartida_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
