server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Usamos un DNS público (Google)
    resolver 8.8.8.8 8.8.4.4 valid=10s;

    # Proxy al backend público en Render
    location /api/ {
        # BACKEND_URL debe contener el protocolo (ej: https://api.onrender.com)
        set $backend "${BACKEND_URL}/";
        proxy_pass $backend;
        
        # Necesario para el handshake SSL con Render (SNI)
        proxy_ssl_server_name on;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $backend_uploads "${BACKEND_URL}/uploads/";
        proxy_pass $backend_uploads;
        
        # Necesario para el handshake SSL con Render (SNI)
        proxy_ssl_server_name on;
        
        proxy_set_header Host $host;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
