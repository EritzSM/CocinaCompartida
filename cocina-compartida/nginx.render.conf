server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Permitir subir imágenes de hasta 10MB sin error 413
    client_max_body_size 10M;
    # Aumentar el buffer de memoria para evitar que guarde en disco temporalmente (el warning)
    client_body_buffer_size 10M;

    # Usamos un DNS público (Google)
    resolver 8.8.8.8 8.8.4.4 valid=10s;

    # Proxy al backend público en Render
    location ~ ^/api/(.*)$ {
        # Evitamos 'rewrite' ya que causa error 500 cuando se usa con proxy_pass dinámico.
        # Construimos la URL completa explícitamente:
        set $backend "${BACKEND_URL}/$1$is_args$args";
        proxy_pass $backend;
        
        # Necesario para el handshake SSL con Render (SNI)
        proxy_ssl_server_name on;
        
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Aumentar timeouts para dar tiempo a que el backend de Render despierte (free tier)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/uploads/(.*)$ {
        # Construimos explícitamente la URL para uploads
        set $backend "${BACKEND_URL}/uploads/$1$is_args$args";
        proxy_pass $backend;
        
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
