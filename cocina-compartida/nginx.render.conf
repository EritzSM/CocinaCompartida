server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Permitir subir imágenes de hasta 10MB sin error 413
    client_max_body_size 10M;
    # Aumentar el buffer de memoria para evitar que guarde en disco temporalmente (el warning)
    client_body_buffer_size 10M;

    # Usamos un DNS público (Google)
    resolver 8.8.8.8 8.8.4.4 valid=10s;

    # Proxy al backend público en Render
    location /api/ {
        # Nginx no reescribe la URI automáticamente cuando proxy_pass usa variables.
        # Quitamos el /api/ para que el backend reciba /recipes, /uploads, etc.
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass ${BACKEND_URL};
        
        # Necesario para el handshake SSL con Render (SNI)
        proxy_ssl_server_name on;
        
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        # Si la app pide /uploads/, Nginx no necesita reescribirlo si el backend espera /uploads/
        # Pero si queremos que funcione igual:
        proxy_pass ${BACKEND_URL};
        
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
