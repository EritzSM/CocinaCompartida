server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Permitir subir imágenes de hasta 10MB sin error 413
    client_max_body_size 10M;
    # Aumentar el buffer de memoria para evitar que guarde en disco temporalmente (el warning)
    client_body_buffer_size 10M;

    # Proxy al backend interno (más rápido y estable)
    location /api/ {
        # Reescribimos para quitar el prefijo /api/ antes de enviar al backend
        # Ejemplo: /api/recipes -> /recipes
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass ${BACKEND_URL};
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Aumentar timeouts para dar tiempo a que el backend de Render despierte
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass ${BACKEND_URL}/uploads/;
        proxy_set_header Host $host;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
