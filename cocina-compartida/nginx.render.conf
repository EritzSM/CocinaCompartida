server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy al backend en Render — BACKEND_URL se reemplaza en runtime
    location /api/ {
        proxy_pass https://${BACKEND_URL}/;
        proxy_set_header Host ${BACKEND_URL};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass https://${BACKEND_URL}/uploads/;
        proxy_set_header Host ${BACKEND_URL};
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
