server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Render internal DNS resolver
    resolver 169.254.169.253 valid=10s;

    # Proxy al backend interno en Render
    location /api/ {
        # Usamos una variable para que Nginx no crashee si el backend tarda en levantar
        set $backend "http://${BACKEND_URL}:3000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $backend_uploads "http://${BACKEND_URL}:3000";
        proxy_pass $backend_uploads;
        proxy_set_header Host $host;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
