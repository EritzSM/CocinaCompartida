server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Permitir subir imágenes de hasta 10MB sin error 413
    client_max_body_size 10M;
    # Aumentar el buffer de memoria para evitar que guarde en disco temporalmente (el warning)
    client_body_buffer_size 10M;

    # Usamos el resolver del sistema o público para resolver el dominio de Render dinámicamente
    resolver 8.8.8.8 8.8.4.4 valid=10s;

    # Proxy al backend público en Render
    location ~ ^/api/(.*)$ {
        set $api_path $1;
        set $backend "${BACKEND_URL}/$api_path$is_args$args";
        proxy_pass $backend;
        
        # Necesario para el handshake SSL con Render (SNI) usando el host exacto
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST};
        
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Aumentar timeouts para dar tiempo a que el backend de Render despierte
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/uploads/(.*)$ {
        set $upload_path $1;
        set $backend_uploads "${BACKEND_URL}/uploads/$upload_path$is_args$args";
        proxy_pass $backend_uploads;
        
        # Necesario para el handshake SSL con Render (SNI) usando el host exacto
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST};
        
        proxy_set_header Host ${BACKEND_HOST};
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # SPA routing — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
