sonar.projectKey=cocina-compartida
sonar.projectName=CocinaCompartida - Frontend
sonar.projectVersion=1.0

sonar.host.url=http://localhost:9000
sonar.token=sqp_391c47fc9fcb6930239a94b55cf52be038fce231

# Source and tests configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Rutas del LCOV pattern en Angular (Angular genera coverage en esta carpeta)
# Nota mental: Sonar probará ambas rutas por formato
sonar.javascript.lcov.reportPaths=coverage/cocina-compartida/lcov.info,coverage/lcov.info

# Archivos ignorados como "código fuente" para las líneas de código (archivos spec, main.ts, environments)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,src/assets/**,src/environments/**,src/main.ts,src/polyfills.ts

# Archivos omitidos de la evaluación de Testing (Para que no bajen tu porcentaje módulos sin lógica o interfaces)
sonar.coverage.exclusions=**/*.spec.ts,src/environments/**,src/main.ts,src/polyfills.ts,**/*.module.ts,**/*.interface.ts,**/*.css,**/*.html
